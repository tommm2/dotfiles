set -g mouse on
set -g prefix C-s
setw -g mode-keys vi
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Rose Pine palette
rp_base="#191724"
rp_surface="#1f1d2e"
rp_overlay="#26233a"
rp_muted="#6e6a86"
rp_subtle="#908caa"
rp_text="#e0def4"
rp_love="#eb6f92"
rp_gold="#f6c177"
rp_rose="#ebbcba"
rp_pine="#31748f"
rp_foam="#9ccfd8"
rp_iris="#c4a7e7"
rp_highlight="#403d52"

# Status bar - frosted glass style
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default"
set -g status-left-length 100
set -g status-right-length 100

# Left: session
set -g status-left "#[fg=$rp_iris]#{?client_prefix,#[fg=$rp_love],}  #S #[fg=$rp_muted]· "

# Window tabs - glass style with purple pill
setw -g window-status-separator " "
setw -g window-status-format "#[fg=$rp_muted,bg=default]#I·#W"
setw -g window-status-current-format "#[fg=$rp_base,bg=$rp_iris,bold] #I #W #[bg=default]"

# Right: subtle time
set -g status-right "#[fg=$rp_muted]· #[fg=$rp_subtle]%H:%M "

# Pane borders - soft
set -g pane-border-style "fg=$rp_highlight"
set -g pane-active-border-style "fg=$rp_iris"

# Message styling
set -g message-style "fg=$rp_text,bg=$rp_overlay"

# Mode styling
setw -g mode-style "fg=$rp_base,bg=$rp_iris"

# Menu styling (right-click context menu)
set -g menu-style "fg=$rp_text,bg=$rp_surface"
set -g menu-selected-style "fg=$rp_base,bg=$rp_iris,bold"
set -g menu-border-style "fg=$rp_iris"

# Popup styling
set -g popup-style "fg=$rp_text,bg=$rp_surface"
set -g popup-border-style "fg=$rp_iris"

# Copy mode styling
set -g copy-mode-match-style "fg=$rp_base,bg=$rp_gold"
set -g copy-mode-current-match-style "fg=$rp_base,bg=$rp_love,bold"

bind r source-file ~/.tmux.conf \; display " Config Reloaded"
